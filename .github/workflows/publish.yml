name: Publish

# Fires on any pushed semver tag (v0.1.2, v0.2.0, etc.). Manual runs are also
# exposed via workflow_dispatch on the Actions page.
#
# Authentication: npm Trusted Publishing via OIDC. The package's trusted
# publisher must be configured on npmjs.com:
#   Packages → aiecsjs → Settings → Publishing access → Trusted publisher
#   Repository:  yshengliao/aiecsjs
#   Workflow:    publish.yml
#   Permissions: npm publish (and optionally npm stage publish)
# No NPM_TOKEN secret is required; the GitHub OIDC token is exchanged for
# registry auth at publish time.
#
# Releasing a new version:
#   1. bump package.json + src/version.ts + README badges + CHANGELOG
#   2. git commit -m "release: vX.Y.Z ..."
#   3. git tag vX.Y.Z -m "..."
#   4. git push origin main vX.Y.Z
# The tag push fires this workflow.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch: {}

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      # contents: read is required for actions/checkout.
      # id-token: write lets npm exchange a GitHub OIDC token for registry
      # auth via the trusted publisher relationship configured on npmjs.com.
      # It also enables sigstore provenance attestation.
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Upgrade npm CLI for Trusted Publishing
        # OIDC trusted publishing requires npm >= 11.5.1. Node 20 ships with
        # npm 10.x, so upgrade explicitly. Without this the publish step
        # falls back to token-based auth and fails with ENEEDAUTH.
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      # prepublishOnly runs typecheck + tests + build + size budget locally,
      # so the publish step doubles as the final gate.
      - name: Publish (OIDC trusted publisher + provenance)
        run: npm publish --provenance --access public
